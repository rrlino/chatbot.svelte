services:
  svelte-dev:
    build: .
    container_name: chatbot-svelte-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - API_BASE_URL=http://host.docker.internal:8080/api/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
